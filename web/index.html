<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <link rel="icon" href="data:,">
  <title>osu-touch</title>
  <script>
    try {
      if (sessionStorage.getItem('osuTouchPin')) document.documentElement.classList.add('has-stored-pin');
    } catch (_) {}
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f8fbff;
      --muted: #94a3b8;
      --ok: #47ff9a;
      --bad: #ffb020;
      --danger: #ff5570;
    }

    * { box-sizing: border-box; }

    .surface *::selection { background: transparent; }

    .pin-gate ::selection {
      background: rgba(71, 255, 154, 0.35);
      color: var(--text);
    }

    .surface * {
      -webkit-user-drag: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .surface {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.26), transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(255, 55, 95, 0.24), transparent 32%),
        linear-gradient(135deg, #05070a 0%, #101827 52%, #090b10 100%);
    }

    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 8vw, 64px);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    .status {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .status.connected { color: var(--ok); }
    .status.connecting { color: var(--muted); }
    .status.disconnected { color: var(--bad); }

    .locked .keys,
    .locked footer {
      filter: blur(10px);
      opacity: 0.22;
    }

    .has-stored-pin .locked .keys,
    .has-stored-pin .locked footer {
      filter: none;
      opacity: 1;
    }

    .pin-gate {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(5, 7, 10, 0.62);
      backdrop-filter: blur(12px);
    }

    .pin-gate[hidden] { display: none; }

    .has-stored-pin .pin-gate { display: none; }

    .pin-card {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(8, 13, 22, 0.88);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      display: grid;
      gap: 14px;
    }

    .pin-card h2 {
      margin: 0;
      font-size: clamp(28px, 8vw, 44px);
      letter-spacing: -0.07em;
      line-height: 0.95;
    }

    .pin-card p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.4;
    }

    .pin-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .pin-row input,
    .pin-row button {
      min-height: 54px;
      border-radius: 16px;
      font: inherit;
      font-weight: 900;
    }

    .pin-row input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      text-align: center;
      letter-spacing: 0.22em;
      font-size: 24px;
    }

    .pin-row input::selection {
      background: rgba(71, 255, 154, 0.42);
      color: #06110a;
    }

    .pin-row button {
      border: 0;
      padding: 0 18px;
      background: var(--ok);
      color: #06110a;
      cursor: pointer;
      transition: transform 90ms linear, background 120ms linear, box-shadow 120ms linear;
    }

    .pin-row button:hover {
      background: #7dffb9;
      color: #03140a;
      box-shadow: 0 0 28px rgba(71, 255, 154, 0.26);
    }

    .pin-row button:active {
      transform: translateY(1px) scale(0.98);
      background: #2eea82;
    }

    .pin-error {
      min-height: 18px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .keys {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 4vw, 34px);
      align-self: center;
      pointer-events: none;
    }

    .key {
      min-height: 42vh;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.04), 0 24px 80px rgba(0, 0, 0, 0.35);
      transition: transform 80ms linear, background 80ms linear, border-color 80ms linear;
    }

    .key.down {
      transform: scale(0.985);
      border-color: rgba(255, 255, 255, 0.7);
      background: linear-gradient(135deg, rgba(255, 55, 95, 0.6), rgba(0, 212, 255, 0.45));
    }

    .key > div {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .key strong {
      display: block;
      font-size: clamp(84px, 25vw, 220px);
      line-height: 0.8;
      letter-spacing: 0;
      text-align: center;
    }

    .key span {
      display: block;
      margin-top: 20px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      font-weight: 800;
    }

    .key.down span { color: white; }

    .hint {
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    .hint strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: clamp(16px, 3vw, 24px);
      letter-spacing: -0.03em;
    }

    .version {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    @media (max-width: 640px) {
      header, footer { align-items: flex-start; }
      .keys { gap: 12px; }
      .key { min-height: 48vh; border-radius: 24px; }
      .hint { font-size: 13px; }
      .pin-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="surface locked" id="surface" draggable="false">
    <header>
      <h1>osu! touch</h1>
      <div id="connection" class="status disconnected">disconnected</div>
      <script>
        try {
          if (document.documentElement.classList.contains('has-stored-pin')) {
            const el = document.getElementById('connection');
            el.textContent = 'connecting';
            el.className = 'status connecting';
          }
        } catch (_) {}
      </script>
    </header>

    <section class="keys" aria-label="Touch state">
      <div id="zKey" class="key"><div><strong>{{.Key1}}</strong><span>up</span></div></div>
      <div id="xKey" class="key"><div><strong>{{.Key2}}</strong><span>up</span></div></div>
    </section>

    <footer>
      <div class="hint">
        <strong>Touch anywhere on the screen</strong>
        Each new touch alternates {{.Key1}} / {{.Key2}}
        <br>
        Release the active touch to release the key
        <span class="version">{{.AppName}} version {{.AppVersion}}</span>
      </div>
    </footer>

  </main>

  <section class="pin-gate" id="pinGate" aria-label="Pairing PIN">
    <form class="pin-card" id="pinForm" autocomplete="off" novalidate>
      <h2>Enter pairing PIN</h2>
      <p>Use the 6 digit PIN shown in the osu-touch console.</p>
      <div class="pin-row">
        <input id="pinInput" name="pin" inputmode="numeric" maxlength="6" placeholder="000000" aria-label="Pairing PIN">
        <button type="submit">Unlock</button>
      </div>
      <div class="pin-error" id="pinError" role="alert"></div>
    </form>
  </section>

  <script>
    (() => {
      const surface = document.getElementById('surface');
      const connection = document.getElementById('connection');
      const keyEls = [document.getElementById('zKey'), document.getElementById('xKey')];
      // Prevent same-frame multi-touch bursts from producing 1ms Z/X/Z taps.
      const simultaneousGuardMs = 10;
      const connectTimeoutMs = 3000;
      const checkingMinMs = 500;
      const startupConnectingMinMs = 500;
      const heldPointers = new Set();
      let socket = null;
      let lastSentMask = -1;
      let currentMask = 0;
      let reconnectTimer = 0;
      let activePointer = null;
      let nextMask = 1;
      let idleBurstStartedAt = 0;
      let pairingPin = sessionStorage.getItem('osuTouchPin') || '';
      let unlocked = false;
      let submittingPin = false;
      let startupReconnectPending = /^\d{6}$/.test(pairingPin);
      const startupReconnectStartedAt = performance.now();

      const pinGate = document.getElementById('pinGate');
      const pinForm = document.getElementById('pinForm');
      const pinInput = document.getElementById('pinInput');
      const pinError = document.getElementById('pinError');

      function setLocked(locked, message = '') {
        unlocked = !locked;
        document.documentElement.classList.remove('has-stored-pin');
        surface.classList.toggle('locked', locked);
        pinGate.hidden = !locked;
        pinError.textContent = message;
        if (locked) {
          startupReconnectPending = false;
          setConnectionState('disconnected');
          clearTouches();
          requestAnimationFrame(() => pinInput.focus());
        }
      }

      function setConnectionState(state) {
        connection.textContent = state;
        connection.classList.toggle('connected', state === 'connected');
        connection.classList.toggle('connecting', state === 'connecting');
        connection.classList.toggle('disconnected', state === 'disconnected');
      }

      function render(mask) {
        keyEls.forEach((el, index) => {
          const down = (mask & (1 << index)) !== 0;
          el.classList.toggle('down', down);
          el.querySelector('span').textContent = down ? 'down' : 'up';
        });
      }

      function sendMask(mask, force = false) {
        currentMask = mask & 3;
        render(currentMask);
        if (!force && currentMask === lastSentMask) return;
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(new Uint8Array([currentMask]));
        lastSentMask = currentMask;
      }

      function clearTouches() {
        heldPointers.clear();
        activePointer = null;
        idleBurstStartedAt = 0;
        sendMask(0, true);
      }

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function waitForMinimum(startedAt, durationMs) {
        return wait(Math.max(0, durationMs - (performance.now() - startedAt)));
      }

      async function checkPairingPin(pin) {
        try {
          const response = await fetch(`/auth?pin=${encodeURIComponent(pin)}`, { cache: 'no-store' });
          if (response.status === 204) return 'valid';
          if (response.status === 401) return 'invalid';
          return 'unreachable';
        } catch (_) {
          return 'unreachable';
        }
      }

      function expireSession(message) {
        sessionStorage.removeItem('osuTouchPin');
        pairingPin = '';
        setLocked(true, message);
      }

      function connect(manual = false) {
        clearTimeout(reconnectTimer);
        if (!/^\d{6}$/.test(pairingPin)) {
          setLocked(true);
          return;
        }
        let opened = false;
        let timedOut = false;
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${location.host}/ws?pin=${encodeURIComponent(pairingPin)}`);
        socket.binaryType = 'arraybuffer';
        const connectTimeout = setTimeout(() => {
          if (socket.readyState !== WebSocket.CONNECTING) return;
          timedOut = true;
          socket.close();
        }, connectTimeoutMs);

        socket.addEventListener('open', async () => {
          clearTimeout(connectTimeout);
          opened = true;
          setLocked(false);
          pinInput.value = '';
          pinError.textContent = '';
          submittingPin = false;
          if (startupReconnectPending) {
            await waitForMinimum(startupReconnectStartedAt, startupConnectingMinMs);
            startupReconnectPending = false;
          }
          setConnectionState('connected');
          lastSentMask = -1;
          sendMask(currentMask, true);
        });

        socket.addEventListener('close', (event) => {
          clearTimeout(connectTimeout);
          if (!startupReconnectPending) setConnectionState('disconnected');
          if (!opened && !timedOut && event.code === 1006) {
            checkPairingPin(pairingPin).then((result) => {
              if (result === 'invalid') {
                expireSession(manual ? 'Invalid PIN' : 'Session expired');
                return;
              }
              reconnectTimer = setTimeout(connect, 600);
            });
            return;
          }
          reconnectTimer = setTimeout(connect, 600);
        });

        socket.addEventListener('error', () => {
          if (!startupReconnectPending) setConnectionState('disconnected');
          socket.close();
        });
      }

      pinInput.addEventListener('input', () => {
        pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 6);
        pinError.textContent = '';
      });

      pinForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (submittingPin) return;
        const value = pinInput.value.trim();
        if (!/^\d{6}$/.test(value)) {
          pinError.textContent = 'Enter exactly 6 digits';
          return;
        }
        submittingPin = true;
        const checkingStartedAt = performance.now();
        pinError.textContent = 'Checking...';
        const result = await checkPairingPin(value);
        await waitForMinimum(checkingStartedAt, checkingMinMs);
        if (result === 'invalid') {
          pinError.textContent = 'Invalid PIN';
          submittingPin = false;
          return;
        }
        if (result === 'unreachable') {
          pinError.textContent = 'Connection failed';
          submittingPin = false;
          return;
        }
        pairingPin = value;
        sessionStorage.setItem('osuTouchPin', value);
        pinError.textContent = 'Connecting...';
        setConnectionState('connecting');
        connect(true);
      });

      surface.addEventListener('pointerdown', (event) => {
        if (!unlocked) return;
        if (event.pointerType !== 'touch' && event.pointerType !== 'mouse') return;
        event.preventDefault();
        if (heldPointers.has(event.pointerId)) return;
        const now = performance.now();
        const wasIdle = heldPointers.size === 0;
        navigator.vibrate?.(0);
        heldPointers.add(event.pointerId);

        if (wasIdle) {
          idleBurstStartedAt = now;
        } else if (now - idleBurstStartedAt <= simultaneousGuardMs) {
          return;
        }

        activePointer = event.pointerId;
        sendMask(nextMask);
        nextMask = nextMask === 1 ? 2 : 1;
      });

      surface.addEventListener('pointermove', (event) => {
        if (!unlocked) return;
        if (heldPointers.has(event.pointerId)) event.preventDefault();
      });

      function releasePointer(event) {
        if (!unlocked) return;
        event.preventDefault();
        if (!heldPointers.delete(event.pointerId)) return;
        if (heldPointers.size === 0) idleBurstStartedAt = 0;
        if (activePointer !== event.pointerId) return;
        activePointer = null;
        sendMask(0);
      }

      surface.addEventListener('pointerup', releasePointer);
      surface.addEventListener('pointercancel', releasePointer);

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) clearTouches();
      });
      window.addEventListener('blur', clearTouches);
      window.addEventListener('pagehide', clearTouches);
      window.addEventListener('beforeunload', clearTouches);
      const blockBrowserGesture = (event) => {
        if (unlocked) event.preventDefault();
      };
      const nonPassive = { passive: false };

      surface.addEventListener('contextmenu', blockBrowserGesture);
      surface.addEventListener('selectstart', blockBrowserGesture);
      surface.addEventListener('dragstart', blockBrowserGesture);
      surface.addEventListener('gesturestart', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchstart', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchmove', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchend', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchcancel', blockBrowserGesture, nonPassive);
      window.addEventListener('contextmenu', blockBrowserGesture);

      render(0);
      connect();
    })();
  </script>
</body>
</html>
