<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <title>osu-touch</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f8fbff;
      --muted: #94a3b8;
      --ok: #47ff9a;
      --bad: #ffb020;
    }

    * { box-sizing: border-box; }

    *::selection { background: transparent; }

    * {
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .surface {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.26), transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(255, 55, 95, 0.24), transparent 32%),
        linear-gradient(135deg, #05070a 0%, #101827 52%, #090b10 100%);
    }

    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 8vw, 64px);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    .status {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .status.connected { color: var(--ok); }
    .status.disconnected { color: var(--bad); }

    .keys {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 4vw, 34px);
      align-self: center;
      pointer-events: none;
    }

    .key {
      min-height: 42vh;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.04), 0 24px 80px rgba(0, 0, 0, 0.35);
      transition: transform 80ms linear, background 80ms linear, border-color 80ms linear;
    }

    .key.down {
      transform: scale(0.985);
      border-color: rgba(255, 255, 255, 0.7);
      background: linear-gradient(135deg, rgba(255, 55, 95, 0.6), rgba(0, 212, 255, 0.45));
    }

    .key strong {
      display: block;
      font-size: clamp(84px, 25vw, 220px);
      line-height: 0.8;
      letter-spacing: -0.12em;
    }

    .key span {
      display: block;
      margin-top: 20px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      font-weight: 800;
    }

    .key.down span { color: white; }

    .hint {
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    .hint strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: clamp(16px, 3vw, 24px);
      letter-spacing: -0.03em;
    }

    @media (max-width: 640px) {
      header, footer { align-items: flex-start; }
      .keys { gap: 12px; }
      .key { min-height: 48vh; border-radius: 24px; }
      .hint { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="surface" id="surface" draggable="false">
    <header>
      <h1>osu! touch</h1>
      <div id="connection" class="status disconnected">disconnected</div>
    </header>

    <section class="keys" aria-label="Touch state">
      <div id="zKey" class="key"><div><strong>Z</strong><span>up</span></div></div>
      <div id="xKey" class="key"><div><strong>X</strong><span>up</span></div></div>
    </section>

    <footer>
      <div class="hint"><strong>Touch anywhere on the screen</strong>Each new touch alternates Z / X<br>Release the active touch to release the key</div>
    </footer>
  </main>

  <script>
    (() => {
      const surface = document.getElementById('surface');
      const connection = document.getElementById('connection');
      const keyEls = [document.getElementById('zKey'), document.getElementById('xKey')];
      const simultaneousGuardMs = 10;
      const heldPointers = new Set();
      let socket = null;
      let lastSentMask = -1;
      let currentMask = 0;
      let reconnectTimer = 0;
      let activePointer = null;
      let nextMask = 1;
      let burstStartedAt = 0;

      function setConnection(connected) {
        connection.textContent = connected ? 'connected' : 'disconnected';
        connection.classList.toggle('connected', connected);
        connection.classList.toggle('disconnected', !connected);
      }

      function render(mask) {
        keyEls.forEach((el, index) => {
          const down = (mask & (1 << index)) !== 0;
          el.classList.toggle('down', down);
          el.querySelector('span').textContent = down ? 'down' : 'up';
        });
      }

      function sendMask(mask, force = false) {
        currentMask = mask & 3;
        render(currentMask);
        if (!force && currentMask === lastSentMask) return;
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(new Uint8Array([currentMask]));
        lastSentMask = currentMask;
      }

      function clearSlots() {
        heldPointers.clear();
        activePointer = null;
        burstStartedAt = 0;
        sendMask(0, true);
      }

      function connect() {
        clearTimeout(reconnectTimer);
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${location.host}/ws`);
        socket.binaryType = 'arraybuffer';

        socket.addEventListener('open', () => {
          setConnection(true);
          lastSentMask = -1;
          sendMask(currentMask, true);
        });

        socket.addEventListener('close', () => {
          setConnection(false);
          reconnectTimer = setTimeout(connect, 600);
        });

        socket.addEventListener('error', () => {
          setConnection(false);
          socket.close();
        });
      }

      surface.addEventListener('pointerdown', (event) => {
        if (event.pointerType !== 'touch' && event.pointerType !== 'mouse') return;
        event.preventDefault();
        if (heldPointers.has(event.pointerId)) return;
        const now = performance.now();
        const wasIdle = heldPointers.size === 0;
        navigator.vibrate?.(0);
        heldPointers.add(event.pointerId);

        if (wasIdle) {
          burstStartedAt = now;
        } else if (now - burstStartedAt <= simultaneousGuardMs) {
          return;
        }

        activePointer = event.pointerId;
        sendMask(nextMask);
        nextMask = nextMask === 1 ? 2 : 1;
      });

      surface.addEventListener('pointermove', (event) => {
        if (heldPointers.has(event.pointerId)) event.preventDefault();
      });

      function releasePointer(event) {
        event.preventDefault();
        if (!heldPointers.delete(event.pointerId)) return;
        if (heldPointers.size === 0) burstStartedAt = 0;
        if (activePointer !== event.pointerId) return;
        activePointer = null;
        sendMask(0);
      }

      surface.addEventListener('pointerup', releasePointer);
      surface.addEventListener('pointercancel', releasePointer);

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) clearSlots();
      });
      window.addEventListener('blur', clearSlots);
      window.addEventListener('pagehide', clearSlots);
      window.addEventListener('beforeunload', clearSlots);
      const blockBrowserGesture = (event) => event.preventDefault();
      const nonPassive = { passive: false };

      surface.addEventListener('contextmenu', blockBrowserGesture);
      surface.addEventListener('selectstart', blockBrowserGesture);
      surface.addEventListener('dragstart', blockBrowserGesture);
      surface.addEventListener('gesturestart', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchstart', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchmove', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchend', blockBrowserGesture, nonPassive);
      surface.addEventListener('touchcancel', blockBrowserGesture, nonPassive);
      window.addEventListener('contextmenu', blockBrowserGesture);

      render(0);
      connect();
    })();
  </script>
</body>
</html>
