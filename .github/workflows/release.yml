name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch_name }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: 386
            arch_name: x86
          - os: windows
            goos: windows
            goarch: amd64
            arch_name: x86_64
          - os: windows
            goos: windows
            goarch: arm64
            arch_name: arm64
          - os: linux
            goos: linux
            goarch: amd64
            arch_name: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          APP_NAME: osu-touch
          APP_VERSION: ${{ github.event.release.tag_name }}
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch_name }}
        run: |
          set -euo pipefail
          package_dir="${APP_NAME}-${APP_VERSION}-${TARGET_OS}-${TARGET_ARCH}"
          mkdir -p "dist/${package_dir}"
          output_name="${APP_NAME}"
          if [ "${TARGET_OS}" = "windows" ]; then
            output_name="${APP_NAME}.exe"
          fi
          go build -trimpath -buildmode=pie -ldflags="-s -w" -o "dist/${package_dir}/${output_name}" .
          cp default-config.yaml "dist/${package_dir}/config.yaml"
          cp LICENSE "dist/${package_dir}/LICENSE"
          (cd dist && zip -9 -r "${package_dir}.zip" "${package_dir}")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-touch-${{ github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch_name }}
          path: dist/*.zip

      - name: Upload release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
